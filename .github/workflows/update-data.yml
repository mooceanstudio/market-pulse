name: Update data snapshot

# Hourly cron keeps data/snapshot.json fresh so the dashboard has a
# meaningful fallback when the browser can't reach the live API.
# The commit also triggers the Pages deploy, so the published site's
# cached data is never more than an hour old.

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch snapshot
        run: node scripts/fetch-snapshot.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          if git diff --cached --quiet; then
            echo "Snapshot unchanged, nothing to commit."
          else
            git commit -m "data: hourly market snapshot"
            git push
          fi
